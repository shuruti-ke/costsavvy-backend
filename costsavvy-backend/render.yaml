services:
  - type: web
    name: costsavvy-backend
    env: python
    plan: starter
    region: oregon
    pythonVersion: "3.11"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: RATE_LIMIT_PER_MINUTE
        value: "30"
      - key: MIN_FACILITIES_TO_DISPLAY
        value: "5"
      - key: MIN_DB_RESULTS_BEFORE_WEB
        value: "3"
      - key: WEB_SEARCH_ENABLED
        value: "true"
      - key: WEB_PRICE_SEARCH_ENABLED
        value: "true"
      - key: TAVILY_API_KEY
        sync: false
      - key: PRICE_WEB_FIRST
        value: "true"
      - key: PRICE_DISCREPANCY_RATIO
        value: "2.5"
      - key: PRICE_DISCREPANCY_MIN_WEB
        value: "500"
      - key: PRICE_DISCREPANCY_MIN_ABS_GAP
        value: "400"
      - key: PRICE_RADIUS_ATTEMPTS
        value: "10,25,50,100,200"
